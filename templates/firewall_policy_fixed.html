{% extends "base.html" %}

{% block title %}防火墙策略 - 测试系统{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-12">
            <h2>防火墙策略</h2>
            <p class="text-muted">配置和执行防火墙策略测试</p>
        </div>
    </div>

    <!-- 全局输入区域 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">全局配置</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="ip_address" class="form-label">IP地址</label>
                        <input type="text" class="form-control" id="ip_address" placeholder="例如: 192.168.1.1">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="request_type" class="form-label">请求类型</label>
                        <select class="form-select" id="request_type">
                            <option value="" selected disabled>请选择请求类型</option>
                            <option value="custom_service">自定义服务</option>
                            <option value="service_group">服务组</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="request_count" class="form-label">请求数量</label>
                        <input type="number" class="form-control" id="request_count" min="1" placeholder="例如: 100">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 表单区域 -->
    <div class="row">
        <!-- 左侧表单 -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">策略配置</h5>
                    <div id="request_type_badge" class="badge bg-secondary">未选择请求类型</div>
                </div>
                <div class="card-body">
                    
                    <!-- 自定义服务表单 -->
                    <div id="custom_service_form" class="request-form" style="display: none;">
                        <h6>自定义服务配置</h6>
                        <div class="mb-3">
                            <label for="custom_service_id" class="form-label">ID</label>
                            <input type="text" class="form-control" id="custom_service_id" value="" placeholder="服务ID">
                        </div>
                        <div class="mb-3">
                            <label for="custom_service_loginuser" class="form-label">登录用户</label>
                            <input type="text" class="form-control" id="custom_service_loginuser" value="secadmin">
                        </div>
                        <div class="mb-3">
                            <label for="custom_service_name" class="form-label">名称</label>
                            <input type="text" class="form-control" id="custom_service_name" value="service0" placeholder="服务名称">
                        </div>
                        <div class="mb-3">
                            <label for="custom_service_desc" class="form-label">描述</label>
                            <input type="text" class="form-control" id="custom_service_desc" value="desc" placeholder="服务描述">
                        </div>
                        <div class="mb-3">
                            <label for="custom_service_content" class="form-label">内容</label>
                            <input type="text" class="form-control" id="custom_service_content" value="tcp;40000;0;0" placeholder="例如: tcp;3334;0;0">
                            <div class="form-text">格式: 协议;端口;起始端口;结束端口</div>
                        </div>
                    </div>
                    
                    <!-- 服务组表单 -->
                    <div id="service_group_form" class="request-form" style="display: none;">
                        <h6>服务组配置</h6>
                        <div class="mb-3">
                            <label for="service_group_id" class="form-label">ID</label>
                            <input type="text" class="form-control" id="service_group_id" placeholder="服务组ID">
                        </div>
                        <div class="mb-3">
                            <label for="service_group_loginuser" class="form-label">登录用户</label>
                            <input type="text" class="form-control" id="service_group_loginuser" value="secadmin">
                        </div>
                        <div class="mb-3">
                            <label for="service_group_name" class="form-label">名称</label>
                            <input type="text" class="form-control" id="service_group_name" placeholder="服务组名称">
                        </div>
                        <div class="mb-3">
                            <label for="service_group_desc" class="form-label">描述</label>
                            <input type="text" class="form-control" id="service_group_desc" placeholder="服务组描述">
                        </div>
                        <div class="mb-3">
                            <label for="service_group_member" class="form-label">成员</label>
                            <input type="text" class="form-control" id="service_group_member" placeholder="例如: 2,3">
                            <div class="form-text">多个成员ID用逗号分隔</div>
                        </div>
                    </div>

                    <!-- 默认提示 -->
                    <div id="default_form" class="text-center text-muted py-5">
                        <i class="fas fa-arrow-up fa-3x mb-3"></i>
                        <p>请先选择请求类型</p>
                    </div>

                    <!-- 发送按钮 -->
                    <div class="d-flex justify-content-end mt-4">
                        <button id="send_request" class="btn btn-primary" disabled>
                            <i class="fas fa-paper-plane me-2"></i>发送请求
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧实时显示区域 -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">实时显示</h5>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="auto_scroll" checked>
                        <label class="form-check-label" for="auto_scroll">自动滚动</label>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="realtime_display" class="p-3" style="height: 500px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; background-color: #f8f9fa;">
                        <div class="text-muted text-center py-5">
                            <i class="fas fa-info-circle fa-2x mb-2"></i>
                            <p>等待请求数据...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const requestTypeSelect = document.getElementById('request_type');
    const requestTypeBadge = document.getElementById('request_type_badge');
    const sendButton = document.getElementById('send_request');
    const realtimeDisplay = document.getElementById('realtime_display');
    const autoScrollCheckbox = document.getElementById('auto_scroll');
    
    // 获取请求类型对应的徽章颜色（先定义，供后续函数使用）
    function getBadgeColor(type) {
        const colors = {
            'custom_service': 'dark',
            'service_group': 'info'
        };
        return colors[type] || 'secondary';
    }
    
    // 更新表单显示的函数
    function updateFormDisplay() {
        const selectedType = requestTypeSelect ? requestTypeSelect.value : '';
        console.log('请求类型已更改:', selectedType);
        
        // 隐藏所有表单
        document.querySelectorAll('.request-form').forEach(form => {
            form.style.display = 'none';
        });
        
        // 隐藏默认提示
        const defaultForm = document.getElementById('default_form');
        if (defaultForm) {
            defaultForm.style.display = 'none';
        }
        
        // 显示对应的表单
        if (selectedType) {
            const targetForm = document.getElementById(`${selectedType}_form`);
            console.log(`尝试显示表单: ${selectedType}_form`);
            console.log(`表单元素:`, targetForm);
            
            if (targetForm) {
                targetForm.style.display = 'block';
                console.log(`表单 ${selectedType}_form 已显示`);
            } else {
                console.error(`找不到表单: ${selectedType}_form`);
            }
            
            if (requestTypeBadge) {
                requestTypeBadge.textContent = selectedType.toUpperCase();
                requestTypeBadge.className = `badge bg-${getBadgeColor(selectedType)}`;
            }
            if (sendButton) {
                sendButton.disabled = false;
            }
        } else {
            if (requestTypeBadge) {
                requestTypeBadge.textContent = '未选择请求类型';
                requestTypeBadge.className = 'badge bg-secondary';
            }
            if (defaultForm) {
                defaultForm.style.display = 'block';
            }
            if (sendButton) {
                sendButton.disabled = true;
            }
        }
    }
    
    // 根据请求类型显示对应的表单
    if (requestTypeSelect) {
        requestTypeSelect.addEventListener('change', updateFormDisplay);
        // 页面加载时也执行一次，处理已有选择的情况
        updateFormDisplay();
    }
    
    // 发送请求按钮点击事件
    if (sendButton) {
        sendButton.addEventListener('click', function() {
            const ipAddress = document.getElementById('ip_address').value;
            const requestType = requestTypeSelect.value;
            const requestCount = document.getElementById('request_count').value || 1;
            
            if (!ipAddress || !requestType) {
                showNotification('请填写必要的配置信息', 'warning');
                return;
            }
            
            // 清空实时显示区域
            if (realtimeDisplay) {
                realtimeDisplay.innerHTML = '';
            }
            
            // 首先获取cookie
            addLogEntry(`正在获取 ${ipAddress} 的cookie...`, 'info');
            
            fetch('/api/get_cookie/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    ip_address: ipAddress
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.from_cache) {
                        addLogEntry(`Cookie获取成功 (来自缓存): ${data.cookie}`, 'success');
                    } else {
                        addLogEntry(`Cookie获取成功 (新获取): ${data.cookie}`, 'success');
                    }
                    addLogEntry(`状态码: ${data.status_code}`, 'info');
                    
                    // 显示响应内容
                    if (data.response_text) {
                        addLogEntry(`响应内容: ${data.response_text}`, 'info');
                    }
                    
                    // 检查cookie是否为空
                    if (!data.cookie) {
                        addLogEntry(`警告: 获取到的cookie为空，请检查Django服务器控制台输出`, 'warning');
                        addLogEntry(`可能的原因: 1. 目标服务器未返回Set-Cookie头 2. 认证失败 3. 网络问题`, 'warning');
                    }
                    
                    // 显示请求信息
                    addLogEntry(`开始发送 ${requestCount} 个 ${requestType.toUpperCase()} 请求到 ${ipAddress}...`, 'info');
                    
                    // 检查cookie是否有效，如果无效则不发送请求
                    if (!data.cookie) {
                        addLogEntry(`由于cookie为空，取消发送请求`, 'warning');
                        return;
                    }
                    
                    // 模拟发送请求
                    simulateRequests(ipAddress, requestType, requestCount, data.cookie);
                } else {
                    addLogEntry(`Cookie获取失败: ${data.error}`, 'danger');
                }
            })
            .catch(error => {
                addLogEntry(`请求出错: ${error.message}`, 'danger');
            });
        });
    }
    
    // 获取CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // 模拟发送请求
    function simulateRequests(ip, type, count, cookie) {
        let sent = 0;
        let baseRequestData = {};
        
        // 根据请求类型获取表单数据
        if (type === 'custom_service') {
            baseRequestData = {
                id: document.getElementById('custom_service_id').value,
                loginuser: document.getElementById('custom_service_loginuser').value,
                name: document.getElementById('custom_service_name').value,
                desc: document.getElementById('custom_service_desc').value,
                content: document.getElementById('custom_service_content').value
            };
            
            // 发送自定义服务请求
            sendCustomServiceRequests(ip, count, baseRequestData, cookie);
            
        } else if (type === 'service_group') {
            baseRequestData = {
                id: document.getElementById('service_group_id').value,
                loginuser: document.getElementById('service_group_loginuser').value,
                name: document.getElementById('service_group_name').value,
                desc: document.getElementById('service_group_desc').value,
                member: document.getElementById('service_group_member').value
            };
            
            // 显示请求详情
            addLogEntry(`请求数据: ${JSON.stringify(baseRequestData, null, 2)}`, 'info');
            
            // 模拟服务组请求
            const interval = setInterval(() => {
                if (sent >= count) {
                    clearInterval(interval);
                    addLogEntry(`所有请求已发送完成`, 'success');
                    return;
                }
        
                const timestamp = new Date().toLocaleTimeString();
                
                addLogEntry(`[${timestamp}] 发送服务组请求 #${sent} 到 ${ip}`, 'primary');
                
                // 模拟响应
                setTimeout(() => {
                    const success = Math.random() > 0.2; // 80%成功率
                    if (success) {
                        addLogEntry(`[${timestamp}] 收到服务组响应 #${sent} - 状态: 成功`, 'success');
                    } else {
                        addLogEntry(`[${timestamp}] 服务组请求 #${sent} 超时`, 'danger');
                    }
                }, 100 + Math.random() * 400);
            }, 500);
        }
    }
    
    // 发送自定义服务请求
    function sendCustomServiceRequests(ip, count, baseData, cookie) {
        console.log('sendCustomServiceRequests - Cookie值:', cookie);
        addLogEntry(`准备发送 ${count} 个自定义服务请求到 ${ip}，Cookie值: ${cookie}`, 'info');
        
        // 准备所有请求数据
        const requests = [];
        for (let i = 1; i <= count; i++) {
            // 根据请求数量修改名称和内容
            const requestData = {...baseData};
            if (count > 1) {
                // 从输入框获取基础名称和内容
                const baseName = baseData.name;
                const baseContent = baseData.content;
                
                // 解析基础内容，提取端口号
                const contentParts = baseContent.split(";");
                if (contentParts.length >= 2) {
                    const basePort = parseInt(contentParts[1]);
                    requestData.content = contentParts[0] + ";" + (basePort + i - 1) + ";" + 
                                        (contentParts.length > 2 ? contentParts[2] : "0") + ";" + 
                                        (contentParts.length > 3 ? contentParts[3] : "0");
                }
                
                // 添加序号到名称
                requestData.name = baseName + "_" + i;
            }
            
            requests.push(requestData);
        }
        
        // 使用批量请求API
        const timestamp = new Date().toLocaleTimeString();
        addLogEntry(`[${timestamp}] 发送批量自定义服务请求到 ${ip}`, 'primary');
        addLogEntry(`请求数据: ${JSON.stringify(requests, null, 2)}`, 'info');
        
        fetch('/api/send_custom_service_batch/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                ip_address: ip,
                cookie: cookie,
                requests: requests
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                addLogEntry(`[${timestamp}] 批量自定义服务请求完成`, 'success');
                addLogEntry(`总计: ${data.total} 个请求, 成功: ${data.success_count} 个, 失败: ${data.failure_count} 个`, 'info');
                
                if (data.responses && data.responses.length > 0) {
                    data.responses.forEach((response) => {
                        if (response.success) {
                            addLogEntry(`请求 #${response.index} 成功: ${response.response || '无响应内容'}`, 'success');
                        } else {
                            addLogEntry(`请求 #${response.index} 失败: ${response.error}`, 'danger');
                        }
                    });
                }
            } else {
                addLogEntry(`[${timestamp}] 批量自定义服务请求失败: ${data.error}`, 'danger');
            }
        })
        .catch(error => {
            addLogEntry(`[${timestamp}] 批量自定义服务请求失败: ${error.message}`, 'danger');
        });
    }
    
    // 添加日志条目
    function addLogEntry(message, type) {
        const logEntry = document.createElement('div');
        logEntry.className = `log-entry mb-2 text-${type}`;
        logEntry.innerHTML = message;
        
        if (realtimeDisplay) {
            realtimeDisplay.appendChild(logEntry);
            
            // 自动滚动到底部
            if (autoScrollCheckbox && autoScrollCheckbox.checked) {
                realtimeDisplay.scrollTop = realtimeDisplay.scrollHeight;
            }
        }
    }
    
    // 显示通知
    function showNotification(message, type) {
        console.log(`${type}: ${message}`);
        const toast = document.createElement('div');
        toast.className = `alert alert-${type === 'warning' ? 'warning' : type === 'danger' ? 'danger' : 'info'} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
        toast.style.zIndex = '9999';
        toast.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
});
</script>
{% endblock %}
